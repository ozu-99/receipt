<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Receipt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Pinyon+Script&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <article class="receipt" id="receipt">
      <header class="receipt-head">
        <div class="sub">RECEIPT&nbsp;&nbsp;|&nbsp;&nbsp;FOR YOU</div>
        <div class="server">SERVER: GOD</div>
      </header>

      <div class="cols">
        <span class="c-qty">QTY</span>
        <span class="c-desc">DESCRIPTION</span>
        <span class="c-amt">AMOUNT</span>
      </div>

      <ul class="items" id="items"></ul>

      <div class="rule"></div>

      <div class="total">
        <span>TOTAL</span>
        <span>$0.00</span>
      </div>

      <p class="footer-note">You'll never settle the bill.<br />but you can worship God<br /><br />at &ldquo;Countdownl 2026.&rdquo;</p>
    </article>
  </main>

  <form class="composer" id="form" autocomplete="off">
    <input
      id="desc"
      type="text"
      placeholder="여기에 입력하고 Enter..."
      maxlength="80"
      autofocus
    />
    <button type="submit" aria-label="추가">＋</button>
    <button type="button" id="clear" aria-label="모두 지우기">↺</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
