<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <title>Receipt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Pinyon+Script&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <main class="stage">
    <article class="receipt" id="receipt">
      <header class="receipt-head">
        <div class="sub">RECEIPT&nbsp;&nbsp;|&nbsp;&nbsp;FOR YOU</div>
        <div class="server">SERVER: GOD</div>
      </header>

      <div class="cols">
        <span class="c-qty">QTY</span>
        <span class="c-desc">DESCRIPTION</span>
        <span class="c-amt">AMOUNT</span>
      </div>

      <div class="items-mask">
        <ul class="items" id="items"></ul>
      </div>

      <button type="button" class="btn-settle" id="settle">CONFIRM</button>
      <button type="button" class="btn-reset" id="clear">CLEAR</button>

      <div class="rule"></div>

      <div class="total">
        <span>TOTAL</span>
        <span id="total-amount">$0.00</span>
      </div>

      <p class="footer-note">You'll never settle the bill.<br />but you can praise God<br /><br />at &ldquo;Countdown 2026.&rdquo;</p>

      <a
        class="visit-btn"
        id="visit-btn"
        href="https://www.countdown2026.org/"
        target="_blank"
        rel="noopener noreferrer"
      >VISIT COUNTDOWN 2026 →</a>

      <button type="button" class="save-btn" id="save-btn">SAVE AS IMAGE</button>

      <!-- 이미지 저장 시에만 보이는 QR 코드 (countdown2026.org 링크) -->
      <div class="qr-wrap" id="qr-wrap">
        <div class="qr-box" id="qr-box"></div>
        <div class="qr-label">SCAN TO VISIT</div>
      </div>
    </article>
  </main>

  <form class="composer" id="form" autocomplete="off">
    <input
      id="desc"
      type="text"
      placeholder="What God has done for me"
      maxlength="80"
      autofocus
    />
    <button type="submit" aria-label="추가">＋</button>
  </form>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
